<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autoprov Smoke Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: #f8fafc;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(10px);
    }
    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(34,197,94,0.15);
      color: #bbf7d0;
      font-weight: 700;
      font-size: .82rem;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 5vw, 3.2rem); }
    p { margin: 0; color: #cbd5e1; line-height: 1.7; }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">Autoprov test</div>
    <h1>This site should self-provision.</h1>
    <p>
      If the new provisioning workflow works, GitHub Actions should create a new Netlify project,
      write the returned site ID into this site's config file, and deploy this page automatically.
    </p>
  </main>
</body>
</html>
