<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Fresh 2</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #111827, #0f172a);
      color: #f8fafc;
    }
    .card {
      width: min(720px, 100%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(10px);
    }
    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(139,92,246,0.15);
      color: #ddd6fe;
      font-weight: 700;
      font-size: .82rem;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 5vw, 3.2rem); }
    p { margin: 0; color: #cbd5e1; line-height: 1.7; }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">Fresh site 2</div>
    <h1>Hello Fresh 2</h1>
    <p>This page exists to confirm that the new autoprov workflow can create and deploy another brand-new Netlify site from repo metadata alone.</p>
  </main>
</body>
</html>
