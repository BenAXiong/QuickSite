name: Deploy Netlify sites

on:
  push:
    branches: [main]
    paths:
      - 'sites/**'
      - '.github/workflows/deploy-netlify-sites.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sample-html-chatgpt
            dir: sites/sample-html-chatgpt
            site_id: fb87ae0c-0c4a-48fd-9fd1-bcae8d6d91de
          - name: second-demo-quicksite
            dir: sites/second-demo
            site_id: 0fb53aae-68b3-41a6-a4c4-4281505450bf

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether this site changed
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          DIR='${{ matrix.dir }}'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BEFORE" "$AFTER" | grep -q "^${DIR}/"; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.changed.outputs.deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Netlify
        if: steps.changed.outputs.deploy == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          npx netlify-cli deploy \
            --dir='${{ matrix.dir }}' \
            --site='${{ matrix.site_id }}' \
            --prod
